name: ts_reminder
description: A study progress and reminder app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core and Auth (Stable)
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  
  # Google Sign-In (Locked to stable 6.2.1 to fix your build error)
  google_sign_in: ^6.2.1

  # Notifications & Alarms
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0
  android_alarm_manager_plus: ^5.0.0

  # State & Storage
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # Audio
  just_audio: ^0.9.36

  # UI / Charts
  fl_chart: ^0.68.0

  # Sharing & File Path (Newly Added)
  share_plus: ^10.1.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
flutter:
  uses-material-design: true

    assets:
    - assets/sounds/
    - assets/audio/assistant/
    - assets/images/    
