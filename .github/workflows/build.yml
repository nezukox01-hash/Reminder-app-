name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    # Tells the server to run commands inside your app folder
    defaults:
      run:
        working-directory: ./ts_reminder

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.6'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build debug APK
    # 📌to return all verson of apk or fat apk again just remove (--target-platform android-arm64)
   
       run: flutter build apk --debug --target-platform android-arm64
       

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ts-reminder-apk
          path: ts_reminder/build/app/outputs/flutter-apk/app-debug.apk
          
